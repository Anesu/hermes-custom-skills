<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title><!-- TITLE --></title>
<style>
  :root { --bg:#0d0d0d; --card:#171717; --card-hover:#1f1f1f; --accent:#d4a853; --accent-dim:#8b6914; --text:#e0ddd4; --text-dim:#9c988c; --border:#2a2a2a; --green:#5a8; --danger:#c44; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; line-height:1.6; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
  .container { max-width:640px; margin:0 auto; padding:16px 16px 80px; }
  .header { padding:24px 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .header h1 { font-size:1.4rem; font-weight:700; letter-spacing:-0.02em; color:var(--accent); }
  .header .sub { font-size:0.82rem; color:var(--text-dim); margin-top:4px; }
  .tabs { display:flex; gap:4px; margin-bottom:20px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:8px 14px; border-radius:8px; font-size:0.78rem; font-weight:600; border:1px solid var(--border); background:var(--card); color:var(--text-dim); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
  .tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .panel { display:none; }
  .panel.active { display:block; }
  .section-title { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); margin:20px 0 12px; font-weight:700; }
  .finding { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:8px; }
  .finding .f-num { font-size:0.68rem; color:var(--danger); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .finding .f-title { font-size:0.9rem; font-weight:700; margin-bottom:6px; }
  .finding .f-body { font-size:0.82rem; color:var(--text-dim); line-height:1.5; }
  .chain-node { display:flex; align-items:center; gap:8px; padding:8px 0; }
  .chain-node .cn-dot { width:12px; height:12px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .chain-node .cn-line { width:2px; height:24px; background:var(--border); margin-left:5px; }
  .chain-node .cn-text { font-size:0.82rem; color:var(--text-dim); }
  .chain-node.failure .cn-dot { background:var(--danger); }
  .action-card { background:var(--card); border-left:3px solid var(--accent); border-radius:0 10px 10px 0; padding:14px; margin-bottom:10px; }
  .action-card .ac-num { font-size:0.68rem; color:var(--accent-dim); text-transform:uppercase; letter-spacing:0.06em; }
  .action-card .ac-title { font-size:0.88rem; font-weight:700; margin:4px 0; }
  .action-card .ac-body { font-size:0.82rem; color:var(--text-dim); }
  blockquote { border-left:3px solid var(--accent); padding:10px 14px; margin:14px 0; font-style:italic; font-size:0.85rem; color:var(--text-dim); background:#1a1a0d; border-radius:0 8px 8px 0; }
  .summary-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:14px; font-size:0.85rem; color:var(--text-dim); line-height:1.7; }
  .summary-box strong { color:var(--text); }
  .footer { margin-top:32px; padding-top:16px; border-top:1px solid var(--border); font-size:0.72rem; color:var(--text-dim); text-align:center; }
  .tag { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:600; margin:2px; }
  .tag.cost { background:#2a1515; color:var(--danger); }
  .tag.cause { background:#1a1a0d; color:var(--accent); }
  .tag.risk { background:#15152a; color:#68d; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><!-- TITLE --></h1>
    <div class="sub"><!-- SUBTITLE --></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('findings')">Findings</div>
    <div class="tab" onclick="switchTab('chain')">Causal Chain</div>
    <div class="tab" onclick="switchTab('root')">Root Cause</div>
    <div class="tab" onclick="switchTab('actions')">Actions</div>
  </div>

  <!-- FINDINGS TAB -->
  <div class="panel active" id="panel-findings">
    <div class="summary-box"><!-- SUMMARY --></div>
    <div class="section-title">Key Findings</div>
    <!-- FINDINGS_LIST -->
  </div>

  <!-- CHAIN TAB -->
  <div class="panel" id="panel-chain">
    <div class="section-title">Failure Chain</div>
    <div style="padding:8px 0"><!-- CHAIN_NODES --></div>
  </div>

  <!-- ROOT CAUSE TAB -->
  <div class="panel" id="panel-root">
    <div class="section-title">Root Cause</div>
    <!-- ROOT_CAUSE_CONTENT -->
  </div>

  <!-- ACTIONS TAB -->
  <div class="panel" id="panel-actions">
    <div class="section-title">Corrective Actions</div>
    <!-- ACTION_CARDS -->
  </div>

  <div class="footer"><!-- FOOTER --></div>
</div>

<script>
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    var el = document.querySelector('.tab[onclick*="'+name+'"]');
    if(el) el.classList.add('active');
    document.getElementById('panel-'+name).classList.add('active');
  }
</script>
</body>
</html>
