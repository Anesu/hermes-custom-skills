<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title><!-- TITLE --></title>
<style>
  :root { --bg:#0d0d0d; --card:#171717; --card-hover:#1f1f1f; --accent:#d4a853; --accent-dim:#8b6914; --text:#e0ddd4; --text-dim:#9c988c; --border:#2a2a2a; --green:#5a8; --danger:#c44; --warn:#da4; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; line-height:1.6; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
  .container { max-width:640px; margin:0 auto; padding:16px 16px 80px; }
  .header { padding:24px 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .header h1 { font-size:1.4rem; font-weight:700; letter-spacing:-0.02em; color:var(--accent); }
  .header .sub { font-size:0.82rem; color:var(--text-dim); margin-top:4px; }
  .tabs { display:flex; gap:4px; margin-bottom:20px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:8px 14px; border-radius:8px; font-size:0.78rem; font-weight:600; border:1px solid var(--border); background:var(--card); color:var(--text-dim); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
  .tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .panel { display:none; }
  .panel.active { display:block; }
  .section-title { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); margin:20px 0 12px; font-weight:700; }
  .phase { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; position:relative; overflow:hidden; }
  .phase .p-num { position:absolute; top:12px; right:14px; font-size:2rem; font-weight:800; color:var(--border); line-height:1; }
  .phase .p-title { font-size:0.95rem; font-weight:700; padding-right:40px; margin-bottom:6px; }
  .phase .p-when { font-size:0.72rem; color:var(--accent-dim); margin-bottom:8px; }
  .phase .p-body { font-size:0.82rem; color:var(--text-dim); line-height:1.5; padding-right:10px; }
  .phase .p-body ul { padding-left:18px; margin-top:6px; }
  .phase .p-body ul li { margin-bottom:4px; }
  .blocker { background:var(--card); border-left:3px solid var(--danger); border-radius:0 10px 10px 0; padding:12px 14px; margin-bottom:8px; font-size:0.82rem; }
  .blocker .b-title { font-weight:700; color:var(--danger); font-size:0.78rem; margin-bottom:4px; }
  .blocker .b-fix { color:var(--green); margin-top:6px; font-weight:600; }
  .next-step { display:flex; gap:12px; padding:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; align-items:flex-start; }
  .next-step .ns-num { flex-shrink:0; width:28px; height:28px; border-radius:50%; background:var(--accent); color:#000; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.85rem; }
  .next-step .ns-body { font-size:0.83rem; color:var(--text-dim); line-height:1.5; }
  .next-step .ns-body strong { color:var(--text); }
  .summary-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:14px; font-size:0.85rem; color:var(--text-dim); line-height:1.7; }
  .summary-box strong { color:var(--text); }
  .tag { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:600; margin:2px; }
  .tag.now { background:#1a2a15; color:var(--green); }
  .tag.soon { background:#1a1a0d; color:var(--warn); }
  .tag.later { background:#15152a; color:#68d; }
  .footer { margin-top:32px; padding-top:16px; border-top:1px solid var(--border); font-size:0.72rem; color:var(--text-dim); text-align:center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><!-- TITLE --></h1>
    <div class="sub"><!-- SUBTITLE --></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('summary')">Summary</div>
    <div class="tab" onclick="switchTab('phases')">Phases</div>
    <div class="tab" onclick="switchTab('blockers')">Blockers</div>
    <div class="tab" onclick="switchTab('next')">Next Steps</div>
  </div>

  <!-- SUMMARY TAB -->
  <div class="panel active" id="panel-summary">
    <div class="summary-box"><!-- SUMMARY --></div>
  </div>

  <!-- PHASES TAB -->
  <div class="panel" id="panel-phases">
    <div class="section-title">Phases</div>
    <!-- PHASES -->
  </div>

  <!-- BLOCKERS TAB -->
  <div class="panel" id="panel-blockers">
    <div class="section-title">Blockers & Mitigations</div>
    <!-- BLOCKERS -->
  </div>

  <!-- NEXT STEPS TAB -->
  <div class="panel" id="panel-next">
    <div class="section-title">Immediate Next Steps</div>
    <!-- NEXT_STEPS -->
  </div>

  <div class="footer"><!-- FOOTER --></div>
</div>

<script>
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    var el = document.querySelector('.tab[onclick*="'+name+'"]');
    if(el) el.classList.add('active');
    document.getElementById('panel-'+name).classList.add('active');
  }
</script>
</body>
</html>
