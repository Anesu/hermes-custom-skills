<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title><!-- TITLE --></title>
<style>
  :root {
    --bg: #0d0d0d; --card: #171717; --card-hover: #1f1f1f;
    --accent: #d4a853; --accent-dim: #8b6914; --text: #e0ddd4;
    --text-dim: #9c988c; --border: #2a2a2a; --green: #5a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.6; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 16px 16px 80px; }
  .header { padding: 24px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); }
  .header .sub { font-size: 0.82rem; color: var(--text-dim); margin-top: 4px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 8px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .panel { display: none; }
  .panel.active { display: block; }
  .section-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin: 20px 0 12px; font-weight: 700; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: background 0.15s; position: relative; overflow: hidden; }
  .card:active { background: var(--card-hover); }
  .card .num { position: absolute; top: 12px; right: 14px; font-size: 2.4rem; font-weight: 800; color: var(--border); line-height: 1; }
  .card .title { font-size: 1rem; font-weight: 700; padding-right: 40px; margin-bottom: 4px; }
  .card .rule { font-size: 0.81rem; color: var(--text-dim); padding-right: 40px; }
  .card .detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; }
  .card.expanded .detail { display: block; }
  .card.expanded { border-color: var(--accent); }
  .toggle-all { font-size: 0.72rem; color: var(--accent); text-align: right; margin-bottom: 6px; cursor: pointer; font-weight: 600; user-select: none; }
  .ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .ex-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
  .ex-card .ex-when { font-size: 0.74rem; color: var(--accent-dim); margin-bottom: 10px; font-style: italic; }
  .ex-card ol { padding-left: 20px; font-size: 0.83rem; color: var(--text-dim); }
  .ex-card ol li { margin-bottom: 6px; }
  .ex-card .prompt { margin-top: 12px; padding: 12px; background: #1a1a0d; border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; font-size: 0.82rem; }
  .ex-card .prompt strong { color: var(--accent); }
  .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.83rem; color: var(--text-dim); user-select: none; }
  .check-item .box { flex-shrink: 0; width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 1px; }
  .check-item.checked .box { background: var(--green); border-color: var(--green); }
  .check-item.checked .box::after { content: '✓'; color: #000; font-size: 0.7rem; font-weight: 800; }
  .check-item.checked { color: var(--text); }
  .progress { margin: 16px 0; font-size: 0.74rem; color: var(--text-dim); }
  .progress .count { color: var(--accent); font-weight: 700; }
  .reset { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 16px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; margin-top: 16px; font-weight: 600; }
  blockquote { border-left: 3px solid var(--accent); padding: 10px 14px; margin: 14px 0; font-style: italic; font-size: 0.85rem; color: var(--text-dim); background: #1a1a0d; border-radius: 0 8px 8px 0; }
  .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 0.72rem; color: var(--text-dim); text-align: center; }
  .overview-text { font-size: 0.88rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 16px; }
  .overview-text strong { color: var(--text); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><!-- TITLE --></h1>
    <div class="sub"><!-- SUBTITLE --></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview')">Overview</div>
    <div class="tab" onclick="switchTab('cards')">Cards</div>
    <div class="tab" onclick="switchTab('exercises')">Exercises</div>
    <div class="tab" onclick="switchTab('checklist')">Tracker</div>
  </div>

  <!-- OVERVIEW TAB -->
  <div class="panel active" id="panel-overview">
    <div class="overview-text"><!-- OVERVIEW_CONTENT --></div>
    <!-- OVERVIEW_BLOCKQUOTE if any -->
  </div>

  <!-- CARDS TAB -->
  <div class="panel" id="panel-cards">
    <div class="section-title">Tap to expand</div>
    <div class="toggle-all" onclick="toggleAll('cards-list')">Expand/Collapse All</div>
    <div id="cards-list"><!-- CARDS --></div>
  </div>

  <!-- EXERCISES TAB -->
  <div class="panel" id="panel-exercises">
    <div class="section-title">Practice Exercises</div>
    <!-- EXERCISES -->
  </div>

  <!-- CHECKLIST TAB -->
  <div class="panel" id="panel-checklist">
    <div class="section-title">Practice Tracker</div>
    <div class="progress">Checked: <span class="count" id="check-count">0</span>/<span id="check-total">0</span></div>
    <div id="checklist"><!-- CHECKLIST_ITEMS --></div>
    <button class="reset" onclick="resetChecks()">Reset All</button>
  </div>

  <div class="footer"><!-- FOOTER --></div>
</div>

<script>
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    var el = document.querySelector('.tab[onclick*="'+name+'"]');
    if (el) el.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  }
  function toggleAll(listId) {
    var cards = document.getElementById(listId).querySelectorAll('.card');
    var anyCollapsed = Array.from(cards).some(function(c) { return !c.classList.contains('expanded'); });
    cards.forEach(function(c) { if (anyCollapsed) c.classList.add('expanded'); else c.classList.remove('expanded'); });
  }
  function toggleCheck(el) { el.classList.toggle('checked'); updateCount(); saveChecks(); }
  function updateCount() { document.getElementById('check-count').textContent = document.querySelectorAll('#checklist .checked').length; }
  function resetChecks() { document.querySelectorAll('#checklist .check-item').forEach(function(el) { el.classList.remove('checked'); }); updateCount(); saveChecks(); }
  function saveChecks() {
    var state = Array.from(document.querySelectorAll('#checklist .check-item')).map(function(el, i) { return {i:i, checked:el.classList.contains('checked')}; });
    localStorage.setItem('html-delivery-checklist', JSON.stringify(state));
  }
  function loadChecks() {
    try {
      var state = JSON.parse(localStorage.getItem('html-delivery-checklist'));
      if (!state) return;
      var items = document.querySelectorAll('#checklist .check-item');
      state.forEach(function(s) { if (s.checked && items[s.i]) items[s.i].classList.add('checked'); });
      updateCount();
    } catch(e) {}
  }
  document.getElementById('checklist').addEventListener('click', function(e) { if (e.target.closest('.check-item')) setTimeout(saveChecks, 50); });
  loadChecks();
</script>
</body>
</html>
