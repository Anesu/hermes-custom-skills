<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title><!-- TITLE --></title>
<style>
  :root { --bg:#0d0d0d; --card:#171717; --accent:#d4a853; --accent-dim:#8b6914; --text:#e0ddd4; --text-dim:#9c988c; --border:#2a2a2a; --green:#5a8; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; line-height:1.6; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
  .container { max-width:640px; margin:0 auto; padding:16px 16px 80px; }
  .header { padding:24px 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .header h1 { font-size:1.4rem; font-weight:700; letter-spacing:-0.02em; color:var(--accent); }
  .header .sub { font-size:0.82rem; color:var(--text-dim); margin-top:4px; }
  .tabs { display:flex; gap:4px; margin-bottom:20px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:8px 14px; border-radius:8px; font-size:0.78rem; font-weight:600; border:1px solid var(--border); background:var(--card); color:var(--text-dim); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
  .tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .panel { display:none; }
  .panel.active { display:block; }
  .section-title { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); margin:20px 0 12px; font-weight:700; }
  .content-block { font-size:0.85rem; color:var(--text-dim); line-height:1.7; margin-bottom:16px; }
  .content-block h2 { font-size:1.05rem; color:var(--text); margin:16px 0 8px; font-weight:700; }
  .content-block h3 { font-size:0.9rem; color:var(--text); margin:12px 0 6px; font-weight:700; }
  .content-block strong { color:var(--text); }
  .content-block ul, .content-block ol { padding-left:20px; margin:8px 0; }
  .content-block li { margin-bottom:4px; }
  .content-block table { width:100%; border-collapse:collapse; margin:12px 0; font-size:0.8rem; }
  .content-block td, .content-block th { padding:8px 10px; border-bottom:1px solid var(--border); text-align:left; }
  .content-block th { color:var(--accent); font-weight:700; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; }
  blockquote { border-left:3px solid var(--accent); padding:10px 14px; margin:14px 0; font-style:italic; font-size:0.85rem; color:var(--text-dim); background:#1a1a0d; border-radius:0 8px 8px 0; }
  .action-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
  .action-item .ai-num { flex-shrink:0; width:24px; height:24px; border-radius:50%; background:var(--accent); color:#000; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.75rem; }
  .action-item .ai-text { font-size:0.83rem; color:var(--text-dim); line-height:1.5; }
  .footer { margin-top:32px; padding-top:16px; border-top:1px solid var(--border); font-size:0.72rem; color:var(--text-dim); text-align:center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><!-- TITLE --></h1>
    <div class="sub"><!-- SUBTITLE --></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('summary')">Summary</div>
    <div class="tab" onclick="switchTab('details')">Details</div>
    <div class="tab" onclick="switchTab('actions')">Actions</div>
  </div>

  <!-- SUMMARY TAB -->
  <div class="panel active" id="panel-summary">
    <div class="content-block"><!-- SUMMARY --></div>
  </div>

  <!-- DETAILS TAB -->
  <div class="panel" id="panel-details">
    <div class="content-block"><!-- DETAILS --></div>
  </div>

  <!-- ACTIONS TAB -->
  <div class="panel" id="panel-actions">
    <div class="section-title">Action Items</div>
    <div><!-- ACTION_ITEMS --></div>
  </div>

  <div class="footer"><!-- FOOTER --></div>
</div>

<script>
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    var el = document.querySelector('.tab[onclick*="'+name+'"]');
    if(el) el.classList.add('active');
    document.getElementById('panel-'+name).classList.add('active');
  }
</script>
</body>
</html>
